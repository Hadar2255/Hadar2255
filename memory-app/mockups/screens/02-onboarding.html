<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Onboarding – מוחי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&family=Nunito:wght@400;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../assets/css/design-tokens.css">
  <link rel="stylesheet" href="../assets/css/layout.css">
  <link rel="stylesheet" href="../assets/css/components.css">
  <link rel="stylesheet" href="../assets/css/animations.css">
  <style>
    .onb-slide {
      flex: 1;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      gap: 24px;
      text-align: center;
    }
    .onb-illustration {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 96px;
      box-shadow: 0 12px 40px rgba(124, 58, 237, 0.25);
    }
    .onb-slide[data-slide="1"] .onb-illustration { background: linear-gradient(135deg, #FAE8FF 0%, #F0ABFC 100%); }
    .onb-slide[data-slide="2"] .onb-illustration { background: linear-gradient(135deg, #FEF3C7 0%, #FCD34D 100%); }
    .onb-slide[data-slide="3"] .onb-illustration { background: linear-gradient(135deg, #DBEAFE 0%, #93C5FD 100%); }
    .onb-title {
      font-size: 28px;
      font-weight: 900;
      color: var(--color-text-primary);
      line-height: 1.2;
    }
    .onb-desc {
      font-size: 15px;
      color: var(--color-text-secondary);
      max-width: 300px;
      line-height: 1.6;
    }
    .onb-top {
      display: flex;
      justify-content: space-between;
      padding: 16px 24px;
    }
    .onb-bottom {
      padding: 16px 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }
  </style>
</head>
<body class="has-frame">
  <div class="mobile-frame">
    <div class="notch"></div>
    <div class="status-bar">
      <span class="time">9:41</span>
      <span class="icons">📶 🔋</span>
    </div>
    <div class="onb-top">
      <span></span>
      <button class="btn btn-ghost btn-sm" data-action="carousel-skip" data-i18n="common.skip">דלג</button>
    </div>
    <div class="page" data-component="carousel">
      <div class="onb-slide" data-slide="1">
        <div class="onb-illustration animate-pop">🧠</div>
        <h2 class="onb-title" data-i18n="onboarding.slide1.title">ברוכים הבאים למוחי!</h2>
        <p class="onb-desc" data-i18n="onboarding.slide1.desc">לימוד שיטות זיכרון מוכחות בכמה דקות ביום, בצורה משחקית וכיפית.</p>
      </div>
      <div class="onb-slide" data-slide="2">
        <div class="onb-illustration animate-pop">🏰</div>
        <h2 class="onb-title" data-i18n="onboarding.slide2.title">שיטות של ג'ים קוויק</h2>
        <p class="onb-desc" data-i18n="onboarding.slide2.desc">תלמד את שיטות הזיכרון הכי יעילות בעולם: ארמון הזיכרון, שרשור, ועוד.</p>
      </div>
      <div class="onb-slide" data-slide="3">
        <div class="onb-illustration animate-pop">🔥</div>
        <h2 class="onb-title" data-i18n="onboarding.slide3.title">תאמן את המוח כל יום</h2>
        <p class="onb-desc" data-i18n="onboarding.slide3.desc">שמור על רצף יומי, צבור נקודות, ופתח שיטות חדשות תוך כדי משחק.</p>
      </div>
      <div class="onb-bottom">
        <div class="dots">
          <div class="dot active"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
        <button class="btn btn-primary btn-block btn-lg" data-action="carousel-next" data-i18n="common.next">הבא</button>
      </div>
    </div>
  </div>
  <script src="../assets/js/i18n.js"></script>
  <script src="../assets/js/navigation.js"></script>
  <script src="../assets/js/interactions.js"></script>
</body>
</html>
