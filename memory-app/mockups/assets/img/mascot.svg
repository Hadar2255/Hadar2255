<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" role="img" aria-label="Brainy mascot">
  <defs>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFC4D8"/>
      <stop offset="100%" stop-color="#F472B6"/>
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <radialGradient id="cheekGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FB7185" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#FB7185" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Body (rounded purple base) -->
  <ellipse cx="100" cy="155" rx="58" ry="32" fill="url(#bodyGrad)"/>

  <!-- Brain head (with squiggly outline) -->
  <path d="M 50 95
           C 35 90, 30 70, 45 60
           C 40 45, 55 35, 70 42
           C 75 30, 95 28, 100 38
           C 105 28, 125 30, 130 42
           C 145 35, 160 45, 155 60
           C 170 70, 165 90, 150 95
           C 155 110, 145 125, 130 122
           C 130 138, 110 142, 100 130
           C 90 142, 70 138, 70 122
           C 55 125, 45 110, 50 95 Z"
        fill="url(#brainGrad)"
        stroke="#BE185D"
        stroke-width="2.5"/>

  <!-- Brain folds (subtle squiggles) -->
  <path d="M 65 70 C 70 65, 75 75, 80 70" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 95 65 C 100 60, 105 70, 110 65" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 125 75 C 130 70, 135 80, 140 75" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 70 100 C 75 95, 80 105, 85 100" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.5"/>
  <path d="M 115 105 C 120 100, 125 110, 130 105" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Center groove -->
  <path d="M 100 38 L 100 130" stroke="#BE185D" stroke-width="1.5" fill="none" opacity="0.4"/>

  <!-- Cheeks -->
  <circle cx="62" cy="100" r="10" fill="url(#cheekGrad)"/>
  <circle cx="138" cy="100" r="10" fill="url(#cheekGrad)"/>

  <!-- Glasses (round) -->
  <circle cx="80" cy="88" r="14" fill="white" stroke="#1F2937" stroke-width="3"/>
  <circle cx="120" cy="88" r="14" fill="white" stroke="#1F2937" stroke-width="3"/>
  <line x1="94" y1="88" x2="106" y2="88" stroke="#1F2937" stroke-width="3"/>

  <!-- Eyes -->
  <circle cx="80" cy="88" r="6" fill="#1F2937"/>
  <circle cx="120" cy="88" r="6" fill="#1F2937"/>
  <circle cx="82" cy="86" r="2" fill="white"/>
  <circle cx="122" cy="86" r="2" fill="white"/>

  <!-- Smile -->
  <path d="M 85 110 Q 100 122 115 110" stroke="#1F2937" stroke-width="3" fill="none" stroke-linecap="round"/>

  <!-- Tiny arm (waving) -->
  <g transform="translate(40 140)" style="transform-origin: 18px 18px;">
    <ellipse cx="18" cy="18" rx="10" ry="14" fill="url(#bodyGrad)" transform="rotate(-25 18 18)"/>
    <circle cx="13" cy="6" r="8" fill="#A78BFA"/>
  </g>

  <!-- Right arm -->
  <ellipse cx="158" cy="155" rx="10" ry="14" fill="url(#bodyGrad)" transform="rotate(25 158 155)"/>
</svg>
